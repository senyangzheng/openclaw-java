openclaw:
  profile: test
  node-name: claw-test
  startup-timeout: 10s
  sessions:
    # test defaults to in-memory — integration tests that need MySQL should set
    # OPENCLAW_SESSIONS_STORE=jdbc and point OPENCLAW_DB_URL at Testcontainers.
    store: ${OPENCLAW_SESSIONS_STORE:memory}

# Turn off DataSource/Flyway/MyBatis-Plus autoconfig in the test profile so
# application context loads without requiring MySQL. JdbcSessionRepositoryIT
# re-enables them via its own @DynamicPropertySource.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
      - com.baomidou.mybatisplus.autoconfigure.MybatisPlusAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.openclaw: DEBUG
